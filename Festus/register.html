<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | RAIC Open Data Platform</title>
    <meta name="description" content="Register for a citizen or publisher account on the RAIC portal.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">    <link rel="icon" type="image/png" href="assets/ChatGPT%20Image%20Jun%2013%2C%202026%2C%2010_24_34%20PM.png">
<link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body class="auth-layout">
    <div class="container">
      <div class="auth-card shadow-sm">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <a href="index.html" class="d-flex align-items-center gap-3 text-decoration-none">
            <div class="brand-mark" aria-hidden="true">RAIC</div>
            <div>
              <strong class="d-block text-dark">RAIC Sierra Leone</strong>
              <small class="text-muted">Open Data Platform</small>
            </div>
          </a>
          <a href="index.html" class="btn btn-link">Back to homepage</a>
        </div>
        <div class="auth-toggle">
          <a href="login.html" class="btn btn-outline-secondary">Login</a>
          <a href="register.html" class="btn btn-outline-secondary active">Register</a>
        </div>
        <h1 class="mb-3">Create account</h1>
        <p class="text-muted mb-4">Register as a citizen or publisher to access open data and request services.</p>
        <form action="register_submit.php" method="post">
          <div class="mb-3"><label class="form-label" for="regName">Full Name</label><input id="regName" name="name" type="text" class="form-control" placeholder="Your name" required></div>
          <div class="mb-3"><label class="form-label" for="regEmail">Email</label><input id="regEmail" name="email" type="email" class="form-control" placeholder="you@example.com" required></div>
          <div class="mb-3"><label class="form-label" for="regPhone">Phone</label><input id="regPhone" name="phone" type="tel" class="form-control" placeholder="+232 76 123 456"></div>
          <div class="mb-3"><label class="form-label" for="regInstitution">Institution</label><input id="regInstitution" name="institution" type="text" class="form-control" placeholder="Ministry or organization"></div>
          <div class="mb-3"><label class="form-label" for="regPassword">Password</label><input id="regPassword" name="password" type="password" class="form-control" placeholder="Create password" required></div>
          <div class="mb-3"><label class="form-label" for="regConfirm">Confirm Password</label><input id="regConfirm" name="confirm" type="password" class="form-control" placeholder="Confirm password" required></div>
          <div class="mb-3"><label class="form-label" for="regRole">Account type</label><select id="regRole" name="role" class="form-select"><option value="citizen" selected>Citizen</option><option value="publisher">Publisher</option></select></div>
          <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>
        <div class="mt-4 text-center text-muted">Already have an account? <a href="login.html">Login</a></div>
        <div class="auth-home mt-4"><a href="index.html">Return to homepage</a></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
