  <body class="auth-layout">
    <div class="container">
      <div class="auth-card shadow-sm">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <a href="index.html" class="d-flex align-items-center gap-3 text-decoration-none">
            <div class="brand-mark" aria-hidden="true">RAIC</div>

              <strong class="d-block text-dark">RAIC Sierra Leone</strong>
              <small class="text-muted">Open Data Platform</small>

        <h1 class="mb-3">Login</h1>
        <p class="text-muted mb-4">Access the RAIC portal for citizens, publishers and administrators.</p>
        <form action="login_submit.php" method="post">
          <div class="mb-3"><label class="form-label" for="loginEmail">Email</label><input id="loginEmail" name="email" type="email" class="form-control" placeholder="you@example.com" required></div>
          <div class="mb-3"><label class="form-label" for="loginPassword">Password</label><input id="loginPassword" name="password" type="password" class="form-control" placeholder="Enter password" required></div>
          <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="rememberMe" name="remember"><label class="form-check-label" for="rememberMe">Remember me</label></div>
          <button class="btn btn-primary w-100 mb-3" type="submit">Login</button>
          <div class="d-flex justify-content-between"><a href="forgot-password.html">Forgot password?</a><a href="register.html">Create account</a></div>
